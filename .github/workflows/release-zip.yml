name: Release Plugin ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  ZIP_NAME: ${{ github.event.repository.name }}.zip

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: プラグインディレクトリをZIP化
        run: |
          zip -r "$ZIP_NAME" . \
              -x ".git/*" \
              -x ".github/*" \
              -x "*.zip"

      - name: リリースにZIPをアップロード
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
